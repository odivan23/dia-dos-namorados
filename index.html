<!DOCTYPE html>
<html>
<head>
  <title>Surpresa 💖</title>
  <style>
    body {
      text-align: center;
      background-color: #ffe6f0;
      font-family: Arial;
    }

    img {
      width: 250px;
      border-radius: 10px;
      margin-top: 20px;
    }

    button {
      background: #ff66b2;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>Clique para sua surpresa 💖</h2>

<img id="foto" src="foto1.png">

<br>

<button onclick="mostrar()">SURPRESA ❤️</button>

<script>
  // Lista de imagens
  const fotos = [
    "foto1.png",
    "foto2.png",
    "foto3.png",
    "foto4.png"
  ];

  function mostrar() {
    // Escolhe uma imagem aleatória
    const aleatoria = Math.floor(Math.random() * fotos.length);
    
    // Troca a imagem
    document.getElementById("foto").src = fotos[aleatoria];

    // Mensagem
    alert("Feliz Dia dos Namorados! ❤️ Você é muito especial pra mim 💖");
  }
</script>

</body>
</html>
</body>
</html>
